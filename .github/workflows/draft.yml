name: Draft backfill

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of games to process this run"
        required: false
        default: "15"

concurrency:
  group: draft
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsx scripts/ingest-draft.mts ${{ github.event.inputs.limit || '15' }}
